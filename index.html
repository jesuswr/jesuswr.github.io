<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fretboard Trainer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0e0e10;
      color: #e8dcc8;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .app {
      width: 100%;
      max-width: 700px;
    }

    .hidden { display: none !important; }

    /* ─── Setup view ─── */
    #setup-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      text-align: center;
    }

    .brand { display: flex; flex-direction: column; gap: 0.5rem; }

    h1 {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #e0833a;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #7a6a5a;
      letter-spacing: 0.04em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.5rem;
      align-items: flex-end;
      justify-content: center;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7a6a5a;
    }

    select,
    input[type="number"] {
      background: #18161a;
      color: #e8dcc8;
      border: 1.5px solid #3a3530;
      border-radius: 6px;
      padding: 0.6rem 0.85rem;
      font-size: 1rem;
      min-width: 120px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    select:focus,
    input[type="number"]:focus { border-color: #e0833a; }

    .btn {
      background: #e0833a;
      color: #0e0e10;
      border: none;
      border-radius: 6px;
      padding: 0.65rem 2.4rem;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.12s, transform 0.08s;
    }

    .btn:hover { background: #f0953c; }
    .btn:active { background: #c86e28; transform: scale(0.97); }

    /* ─── Playing view ─── */
    #playing-view {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .prompt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .find-note {
      font-size: clamp(1.2rem, 4.5vw, 1.7rem);
      font-weight: 600;
      color: #7a6a5a;
    }

    .find-note span {
      color: #f1e6c8;
      font-size: clamp(1.9rem, 7vw, 3rem);
      font-weight: 800;
      margin-left: 0.1em;
    }

    .prompt-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .progress {
      font-size: 0.85rem;
      color: #5a5048;
      white-space: nowrap;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .vol-icon {
      width: 14px;
      height: 14px;
      color: #5a5048;
      flex-shrink: 0;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 72px;
      height: 3px;
      background: #3a3530;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #e0833a;
      cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #e0833a;
      border: none;
      cursor: pointer;
    }

    /* ─── Fretboard ─── */
    .fretboard {
      position: relative;
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      border-left: 7px solid #ddd8c0; /* nut */
      background: linear-gradient(175deg, #3d2410 0%, #2e1a0c 55%, #231309 100%);
      box-shadow:
        0 2px 0 #1a0e06,
        0 6px 24px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 230, 180, 0.08);
      user-select: none;
    }

    /* String */
    .fretboard::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 2.5px;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #e0ddd0, #b0b0a0);
      box-shadow: 0 0 5px rgba(220, 220, 200, 0.5);
      z-index: 1;
      pointer-events: none;
    }

    .fret-cell {
      position: relative;
      flex: 1;
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 2px solid #7a7060;
      cursor: pointer;
      z-index: 2;
      transition: background-color 0.1s ease-out;
      -webkit-tap-highlight-color: transparent;
    }

    .fret-cell:last-child { border-right: none; }

    .fret-cell:hover { background-color: rgba(255, 235, 190, 0.07); }

    .note-label {
      position: relative;
      z-index: 3;
      font-size: clamp(0.52rem, 1.9vw, 0.88rem);
      font-weight: 700;
      color: #f5ead0;
      text-shadow:
        0 0 10px rgba(0, 0, 0, 1),
        0 0 5px rgba(0, 0, 0, 1),
        0 1px 0 rgba(0, 0, 0, 0.8);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    /* Position markers */
    .fret-cell[data-fret="3"]::after,
    .fret-cell[data-fret="5"]::after,
    .fret-cell[data-fret="7"]::after,
    .fret-cell[data-fret="9"]::after {
      content: '';
      position: absolute;
      bottom: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(5px, 1.4vw, 10px);
      height: clamp(5px, 1.4vw, 10px);
      border-radius: 50%;
      background: rgba(200, 178, 120, 0.55);
      z-index: 0;
    }

    /* Feedback flashes */
    .fret-cell.flash-correct { background-color: rgba(40, 210, 80, 0.42) !important; }
    .fret-cell.flash-wrong   { background-color: rgba(220, 45, 45, 0.42) !important; }
    .fret-cell.flash-hint    { background-color: rgba(40, 210, 80, 0.20) !important; }

    /* ─── Results view ─── */
    #results-view {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
    }

    .results-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      text-align: center;
    }

    h2 {
      font-size: clamp(1rem, 3.5vw, 1.4rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6a5a4a;
    }

    .score {
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 800;
      color: #e0833a;
      line-height: 1;
    }

    .score-sub {
      font-size: 0.85rem;
      color: #5a5048;
      margin-top: 0.35rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Setup -->
    <div id="setup-view" class="view">
      <div class="brand">
        <h1>Fretboard Trainer</h1>
        <p class="subtitle">Identify notes on the guitar fretboard</p>
      </div>
      <div class="controls">
        <label>String
          <select id="string-select">
            <option value="E">E  (low)</option>
            <option value="A">A</option>
            <option value="D">D</option>
            <option value="G">G</option>
            <option value="B">B</option>
            <option value="e">e  (high)</option>
          </select>
        </label>
        <label>Notes in sequence
          <input type="number" id="length-input" value="10" min="1" max="50">
        </label>
        <button class="btn" id="start-btn">Start</button>
      </div>
    </div>

    <!-- Playing -->
    <div id="playing-view" class="view hidden">
      <div class="prompt-row">
        <div class="find-note">Find:&nbsp;<span id="current-note"></span></div>
        <div class="prompt-right">
          <div class="progress" id="progress-text"></div>
          <div class="volume-control">
            <svg class="vol-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 1.5L4.5 5H2a.5.5 0 00-.5.5v5a.5.5 0 00.5.5h2.5L8 14.5V1.5z"/>
              <path d="M10.5 5.5a3 3 0 010 5M12.8 3.2a6 6 0 010 9.6"
                    stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
            </svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.02" value="0.7">
          </div>
        </div>
      </div>
      <div class="fretboard" id="fretboard"></div>
    </div>

    <!-- Results -->
    <div id="results-view" class="view hidden">
      <div class="results-inner">
        <h2>Session Complete</h2>
        <div>
          <div class="score" id="score-text"></div>
          <div class="score-sub">correct</div>
        </div>
        <button class="btn" id="retry-btn">Try Again</button>
      </div>
    </div>

  </div>

  <script>
    const STRINGS = {
      E: ['E','F','F#','G','G#','A','A#','B','C','C#','D','D#'],
      A: ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'],
      D: ['D','D#','E','F','F#','G','G#','A','A#','B','C','C#'],
      G: ['G','G#','A','A#','B','C','C#','D','D#','E','F','F#'],
      B: ['B','C','C#','D','D#','E','F','F#','G','G#','A','A#'],
      e: ['E','F','F#','G','G#','A','A#','B','C','C#','D','D#']
    };

    // Open-string frequencies in standard tuning
    const OPEN_FREQ = { E: 82.41, A: 110.00, D: 146.83, G: 196.00, B: 246.94, e: 329.63 };

    const state = {
      stringId: 'E',
      length: 10,
      sequence: [],
      index: 0,
      score: 0,
      locked: false
    };

    // ─── Audio ───────────────────────────────────────────────
    let audioCtx = null;
    let gainNode = null;

    function getCtx() {
      if (!audioCtx) {
        audioCtx = new AudioContext();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = parseFloat(document.getElementById('volume-slider').value);
        gainNode.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function pluck(stringId, fret) {
      const ctx = getCtx();
      const freq = OPEN_FREQ[stringId] * Math.pow(2, fret / 12);
      const sr = ctx.sampleRate;
      const N = Math.round(sr / freq);           // delay line length
      const totalSamples = Math.round(sr * 2.5); // 2.5 s of output

      // Karplus-Strong: noise burst → averaging filter loop
      const ring = new Float32Array(N);
      for (let i = 0; i < N; i++) ring[i] = Math.random() * 2 - 1;

      const out = new Float32Array(totalSamples);
      let p = 0;
      for (let i = 0; i < totalSamples; i++) {
        const next = (p + 1) % N;
        out[i] = ring[p];
        ring[p] = 0.498 * (ring[p] + ring[next]); // lowpass + decay
        p = next;
      }

      const buf = ctx.createBuffer(1, totalSamples, sr);
      buf.copyToChannel(out, 0);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(gainNode);
      src.start();
    }

    // ─── UI helpers ──────────────────────────────────────────
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function flashCell(fret, cls, ms) {
      const el = document.querySelector(`.fret-cell[data-fret="${fret}"]`);
      if (!el) return;
      el.classList.add(cls);
      setTimeout(() => el.classList.remove(cls), ms);
    }

    function updatePrompt() {
      document.getElementById('current-note').textContent =
        STRINGS[state.stringId][state.sequence[state.index]];
      document.getElementById('progress-text').textContent =
        `${state.index + 1} / ${state.length}`;
    }

    // ─── Game logic ──────────────────────────────────────────
    function buildSequence(len) {
      const seq = [];
      for (let i = 0; i < len; i++) {
        let f;
        do { f = Math.floor(Math.random() * 12); } while (i > 0 && f === seq[i - 1]);
        seq.push(f);
      }
      return seq;
    }

    function handleAnswer(fret) {
      if (state.locked) return;
      state.locked = true;

      pluck(state.stringId, fret);

      const expected = state.sequence[state.index];
      if (fret === expected) {
        state.score++;
        flashCell(fret, 'flash-correct', 600);
      } else {
        flashCell(fret, 'flash-wrong', 600);
        flashCell(expected, 'flash-hint', 600);
      }

      setTimeout(() => {
        state.locked = false;
        state.index++;
        if (state.index >= state.length) {
          document.getElementById('score-text').textContent =
            `${state.score} / ${state.length}`;
          showView('results-view');
        } else {
          updatePrompt();
        }
      }, 700);
    }

    function renderFretboard() {
      const fb = document.getElementById('fretboard');
      fb.innerHTML = '';
      STRINGS[state.stringId].forEach((_, i) => {
        const cell = document.createElement('div');
        cell.className = 'fret-cell';
        cell.dataset.fret = i;
        const lbl = document.createElement('span');
        lbl.className = 'note-label';
        lbl.textContent = i;
        cell.appendChild(lbl);
        cell.addEventListener('click', () => handleAnswer(i));
        fb.appendChild(cell);
      });
    }

    // ─── Event listeners ─────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
      state.stringId = document.getElementById('string-select').value;
      state.length = Math.max(1, Math.min(50,
        parseInt(document.getElementById('length-input').value, 10) || 10));
      state.sequence = buildSequence(state.length);
      state.index = 0;
      state.score = 0;
      state.locked = false;
      renderFretboard();
      updatePrompt();
      showView('playing-view');
    });

    document.getElementById('retry-btn').addEventListener('click', () => showView('setup-view'));

    document.getElementById('volume-slider').addEventListener('input', e => {
      if (gainNode) gainNode.gain.value = parseFloat(e.target.value);
    });
  </script>
</body>
</html>
